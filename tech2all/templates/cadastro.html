{% extends 'base.html' %}

{% block title %}Cadastro - Tech2ALL{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Criar Conta</h2>
            <p>Junte-se ao Tech2ALL!</p>
        </div>

        <form action="/cadastro" method="POST" class="auth-form">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex.: Fulano Pereira da Silva" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
            </div>

            <button type="submit" class="btn-primary btn-block">Registrar</button>
        </form>

        <div class="auth-footer">
            <p>Já possui uma conta? <a href="/login">Faça login</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
